{% extends "base.html" %}
{% block content %}
<h2>Backtest – Détail JSON</h2>

<div class="card">
  <div class="row" style="justify-content:space-between; align-items:center;">
    <div>
      <strong>{{ bt.name }}</strong>
      <div class="muted">Backtest #{{ bt.id }} — status: {{ bt.status }}</div>
    </div>
    <div style="display:flex; gap:8px;">
      <a class="btn" href="{% url 'backtest_detail' bt.id %}">Retour</a>
    </div>
  </div>
</div>

<div class="card">
  <h3>Results JSON</h3>
  <pre style="white-space:pre-wrap;">{{ results_pretty }}</pre>
</div>

{% endblock %}
